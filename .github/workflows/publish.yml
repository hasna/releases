name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Publish to npm
        # bun publish reads NPM_CONFIG_TOKEN directly for the default registry
        # (it does not read NODE_AUTH_TOKEN, the npm/setup-node convention).
        # NODE_AUTH_TOKEN is the repo secret holding the npm publish token.
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
